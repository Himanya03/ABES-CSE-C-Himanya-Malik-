<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        .hima{
            display: grid;
            background-color: rgb(150, 219, 196);
            grid-template-columns: auto auto auto ;
            padding: 12px;
        }

        .hima>div{
            background-color: aqua;
            border: 5px solid rgb(28, 137, 110);
            font-size: 20px;
            text-align: center;
            margin: 10px;
        }
    </style>

</head>
<body>
    <div class="hima">
    <div>1</div>
    <div>2</div>
    <div>3</div>
    <div>4</div>
    <div>5</div>
    </div>
</body>
</html>
